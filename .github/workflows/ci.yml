name: CIpipeline-bankapp

on:
  workflow_dispatch:
  


jobs:
  build-test-scan:
    runs-on: ubuntu-latest
      
    steps:

      # 1) Checkout Code

      - name: Check out repository code
        uses: actions/checkout@v4

      # 2) Setting up JAVA
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      
      # 3)  Cache Maven deps (faster builds)
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      # 4) Bauild and Test the code 

      - name: build and test
        run: ./mvnw clean verify

      # 5) SAST Scan 

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          format: table
          exit-code: '0'   # change to '1' later to fail pipeline
          severity: CRITICAL,HIGH


      # 6) Building the Docker image 

      - name: Build docker image 
        run: docker build -t bank-app:latest


      # 7) Scan Docker Image
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: bankapp:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      # 8) Login to Docker hub 

      - name: Docker-hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 9) Tag Image
      
      - name: Tag Docker Image
        run: docker tag bankapp:latest ${{ secrets.DOCKER_USERNAME }}/bankapp:latest

      # 10) Push Image
      
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/bankapp:latest